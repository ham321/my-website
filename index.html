<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💖 A Special Surprise 💌</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Comic Sans MS', cursive;
  text-align:center;
  background: linear-gradient(135deg, #ffdde1, #ee9ca7);
  overflow:hidden;
}

/* Main screen */
.content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
}

h1 { color:#b30059; margin-bottom:10px; }
p { color:#5a2a40; }

#gift {
  font-size:5rem;
  cursor:pointer;
  transition:0.2s;
}
#gift:hover { transform:scale(1.2); }

/* Game screen */
#game {
  display:none;
  position:fixed;
  inset:0;
  background:#fff0f5;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#btn {
  padding:15px 25px;
  font-size:1.2rem;
  border:none;
  border-radius:20px;
  background:#ff4d88;
  color:white;
  cursor:pointer;
  position:absolute;
}

/* Final message */
#final {
  display:none;
  position:fixed;
  inset:0;
  background:#111;
  color:white;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  flex-direction:column;
}

/* Confetti */
.confetti {
  position:absolute;
  font-size:20px;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform:translateY(-10vh); }
  100% { transform:translateY(110vh); }
}
</style>
</head>

<body>

<div class="content">
  <h1>💖 You’ve Got a Surprise 💖</h1>
  <p>Someone sent you something nice…</p>
  <p>Tap the gift to claim it 🎁</p>
  <div id="gift">💝</div>
</div>

<div id="game">
  <h2>🎯 Catch the button to win your prize!</h2>
  <button id="btn">CLICK ME</button>
</div>

<div id="final">
  😂 YOU GOT PLAYED 😂
  <br><br>
  There was no prize 💀
  <br><br>
  <small>but you are the prize ❤️</small>
</div>

<audio id="music" src="https://raw.githubusercontent.com/ham321/my-website/main/sound-effect-happy-birthday-music-box-333245.mp3"></audio>

<script>
const gift = document.getElementById("gift");
const game = document.getElementById("game");
const btn = document.getElementById("btn");
const final = document.getElementById("final");
const music = document.getElementById("music");

// Start prank
gift.onclick = () => {
  document.querySelector(".content").style.display = "none";
  game.style.display = "flex";
  music.play();
};

// Troll button movement
btn.onmouseover = () => {
  btn.style.top = Math.random() * window.innerHeight + "px";
  btn.style.left = Math.random() * window.innerWidth + "px";
};

// After some time → prank reveal
setTimeout(() => {
  if (game.style.display === "flex") {
    game.style.display = "none";
    final.style.display = "flex";

    // Confetti spam
    for (let i = 0; i < 80; i++) {
      let c = document.createElement("div");
      c.className = "confetti";
      c.innerHTML = "🎉";
      c.style.left = Math.random() * 100 + "vw";
      c.style.animationDuration = (Math.random()*3+2)+"s";
      document.body.appendChild(c);
    }
  }
}, 8000);
</script>

</body>
</html>
