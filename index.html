<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👀 Important Message</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #333);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

/* Screens */
.screen { display:none; }
.active { display:block; }

/* Buttons */
button {
  padding:15px 30px;
  font-size:1.2rem;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:20px;
}

#startBtn { background:#ff4d6d; color:white; }
#yesBtn { background:#00cc66; color:white; }
#noBtn { background:#ff3333; color:white; position:absolute; }

/* Final */
#final {
  font-size:2rem;
}
</style>
</head>

<body>

<!-- Intro -->
<div id="start" class="screen active">
  <h1>👀 Yo bro…</h1>
  <p>I got something for you.</p>
  <p>Don’t mess this up.</p>
  <button id="startBtn">Continue</button>
</div>

<!-- Build hype -->
<div id="setup" class="screen">
  <h2>💬 She said she wants to see you…</h2>
  <p>Right now.</p>
  <button id="nextBtn">I’m listening 👀</button>
</div>

<!-- Decision -->
<div id="choice" class="screen">
  <h2>Are you pulling up or what?</h2>
  <button id="yesBtn">YES</button>
  <button id="noBtn">Nah</button>
</div>

<!-- Loading -->
<div id="loading" class="screen">
  <h2>Setting it up…</h2>
  <p id="status">Texting her...</p>
</div>

<!-- Final roast -->
<div id="final" class="screen">
  😂 BRO YOU THOUGHT 😂<br><br>
  You clicked YES that fast??? 💀<br><br>
  Down BAD 😭<br><br>
  <small>I knew you'd fold instantly</small>
</div>

<script>
const start = document.getElementById("start");
const setup = document.getElementById("setup");
const choice = document.getElementById("choice");
const loading = document.getElementById("loading");
const final = document.getElementById("final");

document.getElementById("startBtn").onclick = () => {
  start.classList.remove("active");
  setup.classList.add("active");
};

document.getElementById("nextBtn").onclick = () => {
  setup.classList.remove("active");
  choice.classList.add("active");
};

// Make NO button run away (troll)
const noBtn = document.getElementById("noBtn");
noBtn.onmouseover = () => {
  noBtn.style.top = Math.random() * window.innerHeight + "px";
  noBtn.style.left = Math.random() * window.innerWidth + "px";
};

// YES clicked
document.getElementById("yesBtn").onclick = () => {
  choice.classList.remove("active");
  loading.classList.add("active");

  let messages = [
    "Texting her...",
    "Sending your location...",
    "She said 'hold on'...",
    "She typing...",
    "Wait...",
    "Almost ready..."
  ];

  let i = 0;
  let status = document.getElementById("status");

  let interval = setInterval(() => {
    status.innerText = messages[i];
    i++;

    if (i >= messages.length) {
      clearInterval(interval);

      setTimeout(() => {
        loading.classList.remove("active");
        final.classList.add("active");
      }, 1500);
    }
  }, 800);
};
</script>

</body>
</html>
