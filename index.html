<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👀 Important Message</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #1a1a1a, #333);
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.screen { display:none; }
.active { display:block; }

button {
  padding:15px 30px;
  font-size:1.2rem;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-top:20px;
}

#startBtn { background:#ff4d6d; }
#yesBtn { background:#00cc66; }
#noBtn {
  background:#ff3333;
  position:absolute;
}

/* final screen */
#final {
  font-size:2rem;
  line-height:1.5;
}
</style>
</head>

<body>

<div id="start" class="screen active">
  <h1>👀 Yo bro…</h1>
  <p>I got something IMPORTANT.</p>
  <p>Like… don’t fumble this.</p>
  <button id="startBtn">Continue</button>
</div>

<div id="setup" class="screen">
  <h2>💬 She said she wants to see you…</h2>
  <p>And I’m not joking.</p>
  <button id="nextBtn">Say less 👀</button>
</div>

<div id="choice" class="screen">
  <h2>Be honest… you pulling up?</h2>
  <button id="yesBtn">YES</button>
  <button id="noBtn">Nah</button>
</div>

<div id="loading" class="screen">
  <h2>Connecting you…</h2>
  <p id="status">Analyzing desperation levels...</p>
</div>

<div id="final" class="screen"></div>

<script>
const start = document.getElementById("start");
const setup = document.getElementById("setup");
const choice = document.getElementById("choice");
const loading = document.getElementById("loading");
const final = document.getElementById("final");

let clickTime;

// navigation
document.getElementById("startBtn").onclick = () => {
  start.classList.remove("active");
  setup.classList.add("active");
};

document.getElementById("nextBtn").onclick = () => {
  setup.classList.remove("active");
  choice.classList.add("active");
  clickTime = Date.now();
};

// running NO button 💀
const noBtn = document.getElementById("noBtn");
noBtn.onmouseover = () => {
  noBtn.style.top = Math.random() * window.innerHeight + "px";
  noBtn.style.left = Math.random() * window.innerWidth + "px";
};

// YES clicked
document.getElementById("yesBtn").onclick = () => {
  let reaction = Date.now() - clickTime;

  choice.classList.remove("active");
  loading.classList.add("active");

  let status = document.getElementById("status");

  let messages = [
    "Analyzing desperation levels...",
    "Calculating how fast you folded...",
    "Checking dignity...",
    "Dignity not found 💀",
    "Reviewing your decision...",
    "Yeah… this is crazy 😭"
  ];

  let i = 0;

  let interval = setInterval(() => {
    status.innerText = messages[i];
    i++;

    if (i >= messages.length) {
      clearInterval(interval);

      setTimeout(() => {
        loading.classList.remove("active");
        final.classList.add("active");

        // DIFFERENT ROASTS BASED ON SPEED
        let roast = "";

        if (reaction < 1000) {
          roast = `
          😂 INSTANT CLICK IS INSANE 😂<br><br>
          Bro didn’t even blink 💀<br><br>
          You were WAITING for this 😭<br><br>
          <small>down catastrophic</small>
          `;
        } else if (reaction < 3000) {
          roast = `
          😂 YOU TRIED TO ACT CALM 😂<br><br>
          But still clicked YES 💀<br><br>
          We not fooled 😭<br><br>
          <small>down bad with hesitation</small>
          `;
        } else {
          roast = `
          😂 YOU TOOK YOUR TIME 😂<br><br>
          Acting like you had options 💀<br><br>
          Still folded in the end 😭<br><br>
          <small>delayed but still down bad</small>
          `;
        }

        final.innerHTML = roast;

      }, 1500);
    }
  }, 900);
};
</script>

</body>
</html>
